---
- name: Configure Target EC2
  hosts: target
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Enable Docker
      service:
        name: docker
        enabled: yes
        state: started

    - name: Install Git
      apt:
        name: git
        state: present
